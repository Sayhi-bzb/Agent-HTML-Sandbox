name: Deploy Docs

on:
  push:
    branches:
      - main
    paths:
      - ".agents/skills/ahtml/**"
      - ".github/actions/setup-node-npm/**"
      - ".github/workflows/deploy-docs.yml"
      - "README.md"
      - "blueprint/**"
      - "docs-web/**"
      - "package-lock.json"
      - "package.json"
      - "spec/**"
  workflow_dispatch:

concurrency:
  group: deploy-docs
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy docs to Cloudflare Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Cloudflare credentials
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::Missing GitHub secret CLOUDFLARE_API_TOKEN for Cloudflare Pages deployment."
            exit 1
          fi

          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::error::Missing GitHub secret CLOUDFLARE_ACCOUNT_ID for Cloudflare Pages deployment."
            exit 1
          fi

      - name: Setup Node and dependencies
        uses: ./.github/actions/setup-node-npm
        with:
          install-docs: "true"

      - name: Check docs web
        run: npm run check:docs:ci

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy docs-web/out --project-name agent-html --branch main
