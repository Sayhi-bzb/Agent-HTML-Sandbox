name: Publish npm

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: Run publish checks without publishing
        required: true
        default: true
        type: boolean

concurrency:
  group: publish-npm-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node and dependencies
        uses: ./.github/actions/setup-node-npm
        with:
          registry-url: https://registry.npmjs.org

      - name: Run package release checks
        run: npm run release:check:ci

      - name: Verify tag matches workspace package versions
        if: ${{ github.event_name == 'push' }}
        shell: bash
        run: |
          core_version="$(node -p "JSON.parse(require('fs').readFileSync('packages/core/package.json', 'utf8')).version")"
          ahtml_version="$(node -p "JSON.parse(require('fs').readFileSync('packages/ahtml/package.json', 'utf8')).version")"
          tag_version="${GITHUB_REF_NAME#v}"

          if [[ "$core_version" != "$ahtml_version" ]]; then
            echo "Workspace package versions are out of sync: @agent-html/core=$core_version, @agent-html/ahtml=$ahtml_version." >&2
            exit 1
          fi

          if [[ "$tag_version" != "$core_version" ]]; then
            echo "Tag version '$tag_version' does not match workspace package version '$core_version'." >&2
            exit 1
          fi

      - name: Dry-run publish
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
        run: |
          npm publish --workspace @agent-html/core --access public --dry-run
          npm publish --workspace @agent-html/ahtml --access public --tag latest --dry-run

      - name: Reject manual publish
        if: ${{ github.event_name == 'workflow_dispatch' && !inputs.dry_run }}
        run: |
          echo "Manual publishing is disabled. Push a matching v* tag to publish." >&2
          exit 1

      - name: Publish packages
        if: ${{ github.event_name == 'push' }}
        run: |
          npm publish --workspace @agent-html/core --access public
          npm publish --workspace @agent-html/ahtml --access public --tag latest
