name: Publish npm

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: Run publish checks without publishing
        required: true
        default: true
        type: boolean

concurrency:
  group: publish-npm-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish package
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node and dependencies
        uses: ./.github/actions/setup-node-npm
        with:
          registry-url: https://registry.npmjs.org

      - name: Run package release checks
        run: npm run release:check:ci

      - name: Verify tag matches ahtml package version
        if: ${{ github.event_name == 'push' }}
        shell: bash
        run: |
          version="$(node scripts/release-metadata.mjs version)"
          tag_version="${GITHUB_REF_NAME#v}"

          if [[ "$tag_version" != "$version" ]]; then
            echo "Tag version '$tag_version' does not match @agent-html/ahtml package version '$version'." >&2
            exit 1
          fi

      - name: Dry-run publish
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
        run: |
          dist_tag="$(node scripts/release-metadata.mjs distTag)"
          npm publish --workspace @agent-html/ahtml --access public --tag "$dist_tag" --dry-run

      - name: Reject manual publish
        if: ${{ github.event_name == 'workflow_dispatch' && !inputs.dry_run }}
        run: |
          echo "Manual publishing is disabled. Push a matching v* tag to publish." >&2
          exit 1

      - name: Publish package
        if: ${{ github.event_name == 'push' }}
        run: |
          dist_tag="$(node scripts/release-metadata.mjs distTag)"
          npm publish --workspace @agent-html/ahtml --access public --tag "$dist_tag"
