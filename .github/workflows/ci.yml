name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify package and docs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            docs-web/package-lock.json

      - name: Install package dependencies
        run: npm ci

      - name: Run package checks
        run: npm run check

      - name: Verify packed CLI
        run: npm run verify:pack

      - name: Lint markdown docs
        run: npm run docs:lint

      - name: Install docs dependencies
        run: npm --prefix docs-web ci

      - name: Check docs web
        run: npm run docs:web:check
